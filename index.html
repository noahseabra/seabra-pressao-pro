<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Seabra Pressão Pro</title>
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Seabra Pro" />
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/noahseabra/seabra-pressao-pro/main/public/logo.png" />
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/noahseabra/seabra-pressao-pro/main/public/logo.png" />
  </head>
  <body class="bg-black">
    <div id="root">
      <div style="background-color: #000; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #3B82F6; font-family: sans-serif;">
        <div style="width: 40px; height: 40px; border: 3px solid rgba(59, 130, 246, 0.1); border-top-color: #3B82F6; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px;"></div>
        <div style="font-weight: bold; letter-spacing: 0.25em; font-size: 11px; text-transform: uppercase; color: #4b5563;">Seabra Pressão Pro</div>
        <div id="error-display" style="color: #ef4444; font-size: 10px; margin-top: 20px; max-width: 80%; text-align: center;"></div>
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var display = document.getElementById('error-display');
        if (display) {
          display.innerHTML = 'ERRO DE INICIALIZAÇÃO: ' + msg + '<br>Recarregue a página ou use o Chrome/Safari.';
        }
        return false;
      };
    </script>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
      body { margin: 0; background: black; }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
