name: Build APK Android

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Build do projeto (Ionic)
        run: |
          npx ionic build --prod || npm run build || echo "sem build"

      - name: Instalar Capacitor
        run: npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Criar Android (se não existir)
        run: npx cap add android || echo "Android já existe"

      - name: Sincronizar projeto
        run: npx cap sync android

      - name: Setup Java (necessário pro Android)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Dar permissão ao Gradle
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
